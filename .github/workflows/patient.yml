name: CareSync Patient Service CI/CD

on:
  push:
    branches:
      - dev
      - production
  pull_request:
    branches:
      - dev
      - production

jobs:

  # ── Stage 1: SonarQube SAST ─────────────────────────────────────────────────
  sonarqube:
    name: SonarQube SAST
    uses: caresync-org/template-ci/.github/workflows/template-sonarqube.yml@main
    with:
      service_name: caresync-patient-service
    secrets:
      SONARQUBE_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
      SONARQUBE_URL: ${{ secrets.SONARQUBE_URL }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  # ── Stage 2: Build + Snyk SCA ────────────────────────────────────────────────
  build-and-snyk:
    name: Build + Snyk SCA
    needs: sonarqube
    uses: caresync-org/template-ci/.github/workflows/template-build-snyk.yml@main
    with:
      service_name: caresync-patient-service
      node_version: '20'
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  # ── Stage 3: Docker Build + Trivy + Push ─────────────────────────────────────
  docker:
    name: Docker Build + Push
    needs: build-and-snyk
    uses: caresync-org/template-ci/.github/workflows/template-docker.yml@main
    with:
      service_name: caresync-patient-service
      image_name: caresync-patient
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  # ── Stage 4: Manual Approval Gate (production only) ──────────────────────────
  approval-gate:
    name: Production Approval Gate
    needs: docker
    if: github.ref_name == 'production'
    uses: caresync-org/template-ci/.github/workflows/template-approval-gate.yml@main
    with:
      service_name: caresync-patient-service
      image_version: ${{ needs.docker.outputs.image_version }}
      target_environment: production
      target_namespace: caresync-prod
    secrets:
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

  # ── Stage 5: CD — Update ArgoCD Manifests ────────────────────────────────────
  cd:
    name: CD — Update Manifests
    needs: [docker, approval-gate]
    if: |
      always() &&
      needs.docker.result == 'success' &&
      (needs.approval-gate.result == 'success' || needs.approval-gate.result == 'skipped')
    uses: caresync-org/template-ci/.github/workflows/template-cd.yml@main
    with:
      service_name: caresync-patient-service
      service_key: patient
      image_version: ${{ needs.docker.outputs.image_version }}
      branch: ${{ github.ref_name }}
    secrets:
      MANIFEST_REPO_PAT: ${{ secrets.MANIFEST_REPO_PAT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
      DEV_JWT_SECRET: ${{ secrets.DEV_JWT_SECRET }}
      PROD_JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
